params:
  - id: zeronews_token
    type: string
    name: "zeronews token"
    description: |
      Your ZeroNews authentication token

      How to get your token:
      1. Visit https://user.zeronews.cc/login
      2. Login to your ZeroNews account
      3. Navigate to the Token page
      4. Copy your authentication token
      5. Paste it here

    optional: false

locales:
  zh:
    zeronews_token:
      name: "ZeroNews Token"
      description: |
        您的 ZeroNews 认证令牌

        获取 Token 的步骤：
        1. 访问 https://user.zeronews.cc/login
        2. 登录您的 ZeroNews 账户
        3. 进入 Token 页面
        4. 复制您的认证令牌
        5. 粘贴到此处
